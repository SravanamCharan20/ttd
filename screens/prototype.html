<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TTD Darshan · Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Inter',system-ui,sans-serif;background:#E7E5DF;color:#212121;-webkit-font-smoothing:antialiased;overflow:hidden}
  body{display:flex;flex-direction:column;align-items:center}
  ::-webkit-scrollbar{width:0;height:0}
  .bar{width:100%;display:flex;align-items:center;gap:14px;padding:12px 22px;border-bottom:1px solid #D8D5CD;background:#EFEDE8;flex-shrink:0;z-index:10}
  .logo{width:30px;height:30px;border-radius:8px;background:#4A148C;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
  .title{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .sub{font-size:12px;color:#8A857C}
  .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 15px;border-radius:9px;border:1px solid #C9C4B8;background:#fff;color:#4A148C;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
  .btn:hover{background:#F4F0FB}
  .btn.primary{background:#4A148C;color:#fff;border-color:#4A148C}
  .btn.primary:hover{background:#5B1FA6}
  .now{font-size:12px;color:#4A148C;font-weight:700;padding:5px 12px;border-radius:20px;background:#E3DFF3;white-space:nowrap}
  .stagewrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0}
  .phone{width:360px;height:800px;transform-origin:center center;border-radius:30px;background:#000;box-shadow:0 24px 70px rgba(40,20,80,.28);overflow:hidden;position:relative}
  .viewport{position:absolute;inset:0;overflow:hidden;background:#fff;border-radius:30px}
  .viewport iframe{position:absolute;top:0;left:0;width:360px;height:800px;border:none;display:block;background:#fff;will-change:transform,opacity;backface-visibility:hidden}
  .scrim{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;will-change:opacity;z-index:2}
</style>
</head>
<body>
  <div class="bar">
    <div class="logo">T</div>
    <div>
      <div class="title">TTD Special Entry Darshan</div>
      <div class="sub">Interactive prototype · 720×1600 @ 0.5× (360×800)</div>
    </div>
    <span id="now" class="now">01 · Services</span>
    <div class="spacer"></div>
    <button class="btn" id="backBtn">‹ Back</button>
    <button class="btn primary" id="restartBtn">↻ Restart</button>
  </div>
  <div class="stagewrap" id="stagewrap">
    <div class="phone" id="phone">
      <div class="viewport" id="viewport">
        <iframe id="fa" src="01-services-menu.html" title="prototype screen"></iframe>
        <iframe id="fb" title="prototype screen"></iframe>
        <div class="scrim" id="scrim"></div>
      </div>
    </div>
  </div>

<script>
  var frames=[document.getElementById('fa'), document.getElementById('fb')];
  var scrim=document.getElementById('scrim');
  var phone=document.getElementById('phone');
  var wrap=document.getElementById('stagewrap');
  var nowEl=document.getElementById('now');
  var front=0, busy=false, pending=null;
  var HOME='01-services-menu.html';
  var navStack=[HOME];

  // Screens that behave as modals / bottom-sheets (dim + blurred backdrop baked in).
  var SHEET={'07-confirm-slot-lock.html':1,'18-remove-pilgrim.html':1,'19-constraint-info.html':1,'17-inactivity-prompt.html':1};

  var NAMES={
    '01-services-menu.html':'01 · Services','02-my-pilgrims-empty.html':'02 · My Pilgrims','03-my-pilgrims-list.html':'03 · My Pilgrims',
    '04-add-pilgrim.html':'04 · Add Pilgrim','05-select-pilgrims.html':'05 · Select Pilgrims','06-add-pilgrim-inflow.html':'06 · Add Pilgrim',
    'queue.html':'Virtual Queue','slot-availability.html':'Slot Availability','07-confirm-slot-lock.html':'07 · Confirm Slot',
    '08-payment-hold.html':'08 · Payment','10-upi-redirect.html':'10 · UPI Redirect','12-payment-failed.html':'12 · Payment Failed',
    '13-booking-confirmed.html':'13 · Confirmed','14-hold-expired-queue-open.html':'14 · Hold Expired','18-remove-pilgrim.html':'Remove Pilgrim',
    '19-constraint-info.html':'Constraint Info'
  };
  function label(dest){ return NAMES[dest] || dest.replace('.html','').replace(/-/g,' '); }

  // ---- transition recipes ---------------------------------------------------
  // Each recipe: incoming (b) starts at `bFrom`/`bOp` and animates to rest (0,1);
  // outgoing (f) animates to `fTo`/`fOp`; `topIn` = incoming sits above outgoing.
  // scrim dims the lower layer (scrimStart -> scrimEnd).
  var REST='translate3d(0,0,0) scale(1)';
  var RECIPES={
    forward:{ bFrom:'translate3d(100%,0,0)', bOp:1, fTo:'translate3d(-22%,0,0)', fOp:1, topIn:true,  scrimStart:0,   scrimEnd:.14, ease:'cubic-bezier(.33,.8,.28,1)', dur:300 },
    back:   { bFrom:'translate3d(-22%,0,0)', bOp:1, fTo:'translate3d(100%,0,0)', fOp:1, topIn:false, scrimStart:.14, scrimEnd:0,   ease:'cubic-bezier(.33,.8,.28,1)', dur:300 },
    up:     { bFrom:'translate3d(0,100%,0)', bOp:1, fTo:'translate3d(0,0,0) scale(.98)', fOp:1, topIn:true,  scrimStart:0,   scrimEnd:.22, ease:'cubic-bezier(.32,.72,0,1)',  dur:340 },
    down:   { bFrom:REST,                    bOp:1, fTo:'translate3d(0,100%,0)', fOp:1, topIn:false, scrimStart:.22, scrimEnd:0,   ease:'cubic-bezier(.32,.72,0,1)',  dur:300 },
    fade:   { bFrom:'translate3d(0,0,0) scale(1.02)', bOp:0, fTo:'translate3d(0,0,0) scale(.99)', fOp:0, topIn:true, scrimStart:0, scrimEnd:0, ease:'cubic-bezier(.4,0,.2,1)', dur:240 }
  };

  function park(el){ el.style.transition='none'; el.style.opacity='0'; el.style.transform='translate3d(100%,0,0)'; }
  frames[0].style.transform=REST; frames[0].style.opacity='1'; frames[0].style.zIndex='2';
  park(frames[1]);

  function navigate(dest, dir){
    if(busy){ pending={dest:dest, dir:dir}; return; }
    var r=RECIPES[dir]||RECIPES.forward;
    busy=true;
    nowEl.textContent=label(dest);
    var f=frames[front], b=frames[1-front];
    var started=false;

    function play(){
      if(started) return; started=true;
      b.onload=null;
      // start poses (no transition)
      b.style.transition='none'; f.style.transition='none'; scrim.style.transition='none';
      b.style.zIndex = r.topIn ? '3' : '2';
      f.style.zIndex = r.topIn ? '2' : '3';
      b.style.transform=r.bFrom; b.style.opacity=String(r.bOp);
      f.style.transform=REST;    f.style.opacity='1';
      scrim.style.opacity=String(r.scrimStart);
      void b.offsetWidth; // reflow

      // play
      var tr='transform '+r.dur+'ms '+r.ease+', opacity '+r.dur+'ms '+r.ease;
      b.style.transition=tr; f.style.transition=tr; scrim.style.transition='opacity '+r.dur+'ms '+r.ease;
      b.style.transform=REST; b.style.opacity='1';
      f.style.transform=r.fTo; f.style.opacity=String(r.fOp);
      scrim.style.opacity=String(r.scrimEnd);

      setTimeout(function(){
        front=1-front;
        park(f); f.style.zIndex='1';
        scrim.style.transition='none'; scrim.style.opacity='0';
        busy=false;
        if(pending){ var p=pending; pending=null; navigate(p.dest, p.dir); }
      }, r.dur+30);
    }

    b.onload=function(){ play(); };
    b.src=dest;
    // Don't wait on a slow load event — screens are prewarmed in cache, so the
    // incoming doc is painted within a frame. Kick the animation almost instantly.
    setTimeout(play, 60);
  }

  // ---- direction inference --------------------------------------------------
  function requestNav(dest){
    var cur=navStack[navStack.length-1];
    var goingBack = navStack.length>=2 && dest===navStack[navStack.length-2];
    var dir;
    if(goingBack){ navStack.pop(); dir = SHEET[cur] ? 'down' : 'back'; }
    else if(SHEET[dest]){ navStack.push(dest); dir='up'; }
    else { navStack.push(dest); dir='forward'; }
    navigate(dest, dir);
  }

  // screens reach us via a direct same-origin call OR postMessage — one fires per nav
  window.__protoNav=function(dest){ requestNav(dest); };
  window.addEventListener('message', function(e){ if(e.data && e.data.__ttdnav){ requestNav(e.data.__ttdnav); } });

  document.getElementById('restartBtn').onclick=function(){
    if(busy){ pending={dest:HOME,dir:'fade'}; }
    try{ sessionStorage.removeItem('ttd_pay_attempt'); }catch(_){}
    navStack=[HOME];
    navigate(HOME, 'fade');
  };
  document.getElementById('backBtn').onclick=function(){
    if(navStack.length<2) return;
    requestNav(navStack[navStack.length-2]); // triggers the 'back'/'down' path
  };

  // Prewarm every screen into the HTTP cache on startup, so later src swaps
  // resolve from disk instantly instead of hitting the network on each tap.
  (function(){
    try{
      var warmed={};
      Object.keys(NAMES).forEach(function(u){
        if(warmed[u]) return; warmed[u]=1;
        fetch(u, {cache:'force-cache'}).catch(function(){});
      });
    }catch(_){}
  })();

  // fit the 360×800 phone into the available space (never upscale past 1×)
  function fit(){
    var availW=wrap.clientWidth-40, availH=wrap.clientHeight-40;
    var scale=Math.min(1, availW/360, availH/800);
    if(!isFinite(scale)||scale<=0) scale=1;
    phone.style.transform='scale('+scale+')';
  }
  window.addEventListener('resize', fit); fit(); setTimeout(fit,60);
</script>
</body>
</html>
