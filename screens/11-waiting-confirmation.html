<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>11 · Waiting for confirmation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#ECEFF1;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  ::-webkit-scrollbar{width:0;height:0}
  @keyframes pulseOpacity{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes popIn{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div style="width:375px;height:780px;background:#fff;border-radius:18px;border:1px solid #DDE1E6;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(40,20,80,.08)">
        <div style="background:#4A148C;color:#fff;flex-shrink:0"><div style="height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px"><span style="font-weight:600">10:02</span><span style="display:flex;align-items:center;gap:8px"><b style="font-weight:700;font-size:10px">5G</b><span style="display:inline-block;width:20px;height:11px;border:1px solid #fff;border-radius:2px;position:relative"><span style="position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:#fff;border-radius:1px"></span></span></span></div><div style="height:56px;display:flex;align-items:center;justify-content:center"><span style="font-size:17px;font-weight:600">Complete Payment</span></div></div>
        <div style="padding:16px 16px 8px;flex-shrink:0"><div style="height:8px;border-radius:4px;background:#E0E0E0;overflow:hidden"><div style="height:100%;width:42%;background:#673AB7;border-radius:4px"></div></div><div style="text-align:right;font-size:16px;font-weight:700;color:#212121;margin-top:8px">1:16 remaining</div></div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 32px;text-align:center">
          <div style="width:54px;height:54px;border-radius:50%;border:4px solid #EDE7F6;border-top-color:#673AB7;margin-bottom:24px;animation:spin .8s linear infinite"></div>
          <div style="font-size:17px;font-weight:700;color:#212121;margin-bottom:8px">Waiting for payment confirmation…</div>
          <div style="font-size:13.5px;color:#757575;line-height:1.55;margin-bottom:28px">This usually takes a few seconds. Your slot stays locked.</div>
          <div style="width:100%;background:#FFF8E1;border:1px solid #FFE082;border-radius:10px;padding:12px;margin-bottom:20px;text-align:left"><div style="font-size:12.5px;color:#B26A00;line-height:1.5">No response after 30 seconds? Try again or switch method below.</div></div>
          <div style="display:flex;gap:12px;width:100%"><button style="flex:1;height:46px;border:1px solid #673AB7;border-radius:8px;background:#fff;color:#673AB7;font-size:14.5px;font-weight:700;cursor:pointer">Change Method</button><button style="flex:1;height:46px;border:none;border-radius:8px;background:#673AB7;color:#fff;font-size:14.5px;font-weight:700;cursor:pointer">Retry UPI</button></div>
        </div>
      </div>

</body>
</html>
