<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Darshan Availability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#ECEFF1;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  ::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div style="width:375px;height:780px;background:#fff;border-radius:18px;border:1px solid #DDE1E6;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(40,20,80,.08)">
        <div style="background:#4A148C;color:#fff;flex-shrink:0">
          <div style="height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px"><span style="font-weight:600">10:00</span><span style="display:flex;align-items:center;gap:8px"><b style="font-weight:700;font-size:10px">5G</b><span style="display:inline-block;width:20px;height:11px;border:1px solid #fff;border-radius:2px;position:relative"><span style="position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:#fff;border-radius:1px"></span></span></span></div>
          <div style="height:56px;display:flex;align-items:center;gap:16px;padding:0 16px"><span data-goto="queue.html" style="font-size:22px;line-height:1;cursor:pointer">←</span><span style="font-size:17px;font-weight:600">Darshan Availability · Sri PAT</span></div>
        </div>
        <div style="flex:1;overflow:auto;background:#FAFAFB">
          <div style="padding:20px 16px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
              <div style="font-size:18px;font-weight:700;color:#212121">Darshan Slots</div>
              <button style="display:flex;align-items:center;gap:6px;background:none;border:none;color:#673AB7;font-size:14px;font-weight:600;cursor:pointer;padding:0">Refresh
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#673AB7" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
              </button>
            </div>
            <div style="background:#fff;border:1px solid #E0E0E0;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(40,20,80,.04)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <button style="width:28px;height:28px;border-radius:50%;border:1px solid #E0E0E0;background:#fff;color:#673AB7;font-size:15px;cursor:pointer;line-height:1">‹</button>
                <div style="font-size:15px;font-weight:700;color:#212121">July 2026</div>
                <button style="width:28px;height:28px;border-radius:50%;border:1px solid #E0E0E0;background:#fff;color:#673AB7;font-size:15px;cursor:pointer;line-height:1">›</button>
              </div>
              <div id="cal" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px"></div>
            </div>
            <div style="background:#fff;border:1px solid #E0E0E0;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px 12px">
              <div style="display:flex;align-items:center;gap:8px"><span style="width:11px;height:11px;border-radius:3px;background:#4CAF50"></span><span style="font-size:12px;color:#555">Available</span></div>
              <div style="display:flex;align-items:center;gap:8px"><span style="width:11px;height:11px;border-radius:3px;background:#F44336"></span><span style="font-size:12px;color:#555">Quota is Full</span></div>
              <div style="display:flex;align-items:center;gap:8px"><span style="width:11px;height:11px;border-radius:3px;background:#42A5F5"></span><span style="font-size:12px;color:#555">Not Released</span></div>
              <div style="display:flex;align-items:center;gap:8px"><span style="width:11px;height:11px;border-radius:3px;background:#FFB300"></span><span style="font-size:12px;color:#555">Filling Fast</span></div>
              <div style="display:flex;align-items:center;gap:8px"><span style="width:11px;height:11px;border-radius:3px;background:#E0E0E0"></span><span style="font-size:12px;color:#555">Not Available</span></div>
            </div>
            <div style="height:1px;background:#E0E0E0;margin:0 -16px 16px"></div>
            <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;gap:12px">
              <div>
                <div style="font-size:11px;color:#9AA0A8;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Selected date</div>
                <div style="font-size:16px;font-weight:700;color:#212121">11 Jul 2026 · Sat</div>
              </div>
              <div style="flex-shrink:0">
                <div style="font-size:11px;color:#9AA0A8;font-weight:600;margin-bottom:4px">Tickets</div>
                <div style="display:flex;align-items:center;border:1px solid #CFCFD6;border-radius:8px;overflow:hidden;height:38px">
                  <button onclick="tk(-1)" style="width:34px;height:100%;border:none;background:#F7F7F9;color:#673AB7;font-size:18px;cursor:pointer;line-height:1">−</button>
                  <div id="tk" style="width:34px;text-align:center;font-size:15px;font-weight:700;color:#212121">4</div>
                  <button onclick="tk(1)" style="width:34px;height:100%;border:none;background:#F7F7F9;color:#673AB7;font-size:18px;cursor:pointer;line-height:1">+</button>
                </div>
              </div>
            </div>
            <div style="font-size:13px;color:#757575;margin-bottom:12px">Select any 1 slot</div>
            <div id="slots"></div>
          </div>
        </div>
        <div style="flex-shrink:0;display:flex;gap:12px;padding:16px;border-top:1px solid #EEE;background:#fff">
          <button data-goto="queue.html" style="flex:1;height:48px;border:1px solid #673AB7;border-radius:8px;background:#fff;color:#673AB7;font-size:16px;font-weight:700;cursor:pointer">Back</button>
          <button data-goto="07-confirm-slot-lock.html" style="flex:1.4;height:48px;border:none;border-radius:8px;background:#673AB7;color:#fff;font-size:16px;font-weight:700;cursor:pointer">Continue</button>
        </div>
      </div>
<script>
(function(){
  // July 2026: 1st is Wednesday (offset 3)
  var status={}; for(var i=1;i<=6;i++)status[i]='blue'; status[7]='grey'; status[9]='amber'; status[16]='full'; status[23]='amber';
  var SEL=11;
  var col={green:['#E7F6E7','#2E7D32'],amber:['#FFF4D6','#9A6A00'],blue:['#E3F2FD','#1976D2'],full:['#FDE7E7','#C62828'],grey:['#F0F0F0','#BDBDBD']};
  var cal=document.getElementById('cal');
  ['S','M','T','W','T','F','S'].forEach(function(d){ var e=document.createElement('div'); e.style.cssText='text-align:center;font-size:11px;font-weight:600;color:#9AA0A8;padding:2px 0'; e.textContent=d; cal.appendChild(e); });
  for(var b=0;b<3;b++){ var bl=document.createElement('div'); bl.style.height='36px'; cal.appendChild(bl); }
  for(var n=1;n<=31;n++){ var st=status[n]||'green'; var e=document.createElement('div');
    if(n===SEL){ e.style.cssText='height:36px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;background:#673AB7;border-radius:8px;cursor:pointer'; }
    else{ var c=col[st]; e.style.cssText='height:36px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:'+c[1]+';background:'+c[0]+';border-radius:8px;'+(st==='grey'?'cursor:default':'cursor:pointer'); }
    e.textContent=n; cal.appendChild(e);
  }
  var tickets=4, selSlot=1;
  var slotData=[{t:'8:00 am',c:'134',s:'avail'},{t:'9:00 am',c:'217',s:'avail'},{t:'10:00 am',c:'18',s:'fast'},{t:'1:00 pm',c:'153',s:'avail'}];
  window.tk=function(d){ tickets=Math.max(1,Math.min(6,tickets+d)); document.getElementById('tk').textContent=tickets; render(); };
  function render(){
    var box=document.getElementById('slots'); box.innerHTML='';
    slotData.forEach(function(d,i){
      var on=i===selSlot; var bg=d.s==='fast'?'#FFB300':'#4CAF50'; var fg=d.s==='fast'?'#5A3D00':'#fff';
      var card=document.createElement('div');
      card.style.cssText='display:flex;align-items:stretch;margin-bottom:12px;border-radius:12px;overflow:hidden;cursor:pointer;background:#fff;border:'+(on?'2px':'1px')+' solid '+(on?'#673AB7':'#E0E0E0')+';box-shadow:'+(on?'0 2px 12px rgba(103,58,183,.14)':'0 1px 4px rgba(40,20,80,.04)');
      card.innerHTML='<div style="width:72px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:'+bg+';color:'+fg+';text-align:center"><div style="font-size:19px;font-weight:800;line-height:1">'+d.c+'</div><div style="font-size:11px;font-weight:600;margin-top:4px;opacity:.92">Available</div></div>'+
        '<div style="flex:1;padding:16px"><div style="font-size:13px;font-weight:700;color:#E91E63;margin-bottom:4px">Slot Time '+d.t+'</div><div style="font-size:13px;color:#757575;margin-bottom:4px">'+tickets+' Person'+(tickets>1?'s':'')+'</div><div style="font-size:16px;font-weight:700;color:#212121">\u20b9'+(200*tickets)+'</div></div>'+
        '<div style="display:flex;align-items:center;padding-right:16px"><div style="width:22px;height:22px;border-radius:50%;border:2px solid '+(on?'#673AB7':'#CFCFD6')+';display:flex;align-items:center;justify-content:center">'+(on?'<div style="width:10px;height:10px;border-radius:50%;background:#673AB7"></div>':'')+'</div></div>';
      card.onclick=function(){ selSlot=i; render(); };
      box.appendChild(card);
    });
  }
  render();
})();
</script>
<script>
(function(){
  window.__goto=function(dest){
    if(window.parent&&window.parent!==window){ window.parent.postMessage({__ttdnav:dest},'*'); }
    else{ location.href=dest; }
  };
  document.addEventListener('click',function(e){
    var el=e.target&&e.target.closest?e.target.closest('[data-goto]'):null;
    if(el){ e.preventDefault(); window.__goto(el.getAttribute('data-goto')); }
  });
})();
</script>
</body>
</html>
