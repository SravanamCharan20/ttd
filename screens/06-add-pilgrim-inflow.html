<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>06 · Add Pilgrim (in-flow)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#ECEFF1;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  ::-webkit-scrollbar{width:0;height:0}
  input{font-family:inherit}
  @keyframes pulseOpacity{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div style="width:375px;height:780px;background:#fff;border-radius:18px;border:1px solid #DDE1E6;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(40,20,80,.08)">
        <div style="background:#4A148C;color:#fff;flex-shrink:0">
          <div style="height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px"><span style="font-weight:600">10:00</span><span style="display:flex;align-items:center;gap:8px"><b style="font-weight:700;font-size:10px">5G</b><span style="display:inline-block;width:20px;height:11px;border:1px solid #fff;border-radius:2px;position:relative"><span style="position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:#fff;border-radius:1px"></span></span></span></div>
          <div style="height:56px;display:flex;align-items:center;gap:16px;padding:0 16px"><span style="font-size:22px;line-height:1;cursor:pointer">←</span><span style="font-size:17px;font-weight:600">Add Pilgrim</span></div>
        </div>
        <!-- context strip: this is in-flow, not the calm pre-booking form -->
        <div style="flex-shrink:0;background:#EDE7F6;display:flex;align-items:center;gap:10px;padding:11px 16px">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#fff;color:#673AB7;flex-shrink:0"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span>
          <span style="font-size:12.5px;color:#4A148C;line-height:1.4;font-weight:600">Adding to <span style="font-weight:700">this booking</span> — they'll be selected automatically.</span>
        </div>
        <div style="flex:1;overflow:auto;padding:18px 16px">
          <div style="margin-bottom:20px">
            <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Name <span style="color:#F44336">*</span></label>
            <input id="qaName" oninput="qaCheck()" placeholder="Full name as on ID proof" style="width:100%;height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 14px;font-size:16px;color:#212121;background:#fff" />
            <div style="font-size:11.5px;color:#9E9E9E;margin-top:8px">Must match the ID shown at the temple gate</div>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:20px">
            <div style="flex:1">
              <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Age <span style="color:#F44336">*</span></label>
              <input id="qaAge" oninput="qaCheck()" placeholder="Age" inputmode="numeric" style="width:100%;height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 14px;font-size:16px;color:#212121;background:#fff" />
            </div>
            <div style="flex:1.3">
              <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Gender <span style="color:#F44336">*</span></label>
              <div style="height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 14px;font-size:16px;color:#212121;background:#fff;display:flex;align-items:center;justify-content:space-between">Male <span style="color:#757575;font-size:13px">▼</span></div>
            </div>
          </div>
          <div style="margin-bottom:20px">
            <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Photo ID Proof <span style="color:#F44336">*</span></label>
            <div style="height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 14px;font-size:16px;color:#212121;background:#fff;display:flex;align-items:center;justify-content:space-between">Aadhaar Card <span style="color:#757575;font-size:13px">▼</span></div>
          </div>
          <div style="margin-bottom:20px">
            <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Photo ID Number <span style="color:#F44336">*</span></label>
            <input id="qaId" oninput="qaCheck()" placeholder="Enter ID number" style="width:100%;height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 14px;font-size:16px;color:#212121;background:#fff" />
          </div>
          <div style="background:#F5F5F5;border-radius:10px;padding:13px 14px;display:flex;gap:10px;align-items:flex-start">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="1.8" style="flex-shrink:0;margin-top:1px"><path d="M5 13l4 4L19 7"/></svg>
            <div style="font-size:12.5px;color:#757575;line-height:1.55">Saved to <b>My Pilgrims</b> too — no need to re-type for the next release.</div>
          </div>
        </div>
        <div style="flex-shrink:0;display:flex;gap:12px;padding:16px 16px;border-top:1px solid #EEE;background:#fff">
          <button style="flex:1;height:48px;border:1px solid #673AB7;border-radius:8px;background:#fff;color:#673AB7;font-size:16px;font-weight:700;cursor:pointer">Cancel</button>
          <button id="qaBtn" disabled style="flex:1.3;height:48px;border:none;border-radius:8px;background:#E4E4E8;color:#A8A8AE;font-size:16px;font-weight:700;cursor:not-allowed">Add &amp; Select</button>
        </div>
      </div>
<script>
function qaCheck(){
  const ok=['qaName','qaAge','qaId'].every(i=>document.getElementById(i).value.trim());
  const b=document.getElementById('qaBtn');
  b.disabled=!ok;
  b.setAttribute('style','flex:1.3;height:48px;border:none;border-radius:8px;font-size:16px;font-weight:700;'+(ok?'background:#673AB7;color:#fff;cursor:pointer':'background:#E4E4E8;color:#A8A8AE;cursor:not-allowed'));
}
</script>
</body>
</html>
