<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>08 · Payment Hold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#ECEFF1;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  ::-webkit-scrollbar{width:0;height:0}
  input{font-family:inherit}
  @keyframes pulseOpacity{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div style="width:375px;height:780px;background:#fff;border-radius:18px;border:1px solid #DDE1E6;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(40,20,80,.08)">
        <div style="background:#4A148C;color:#fff;flex-shrink:0">
          <div style="height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px"><span style="font-weight:600">10:00</span><span style="display:flex;align-items:center;gap:8px"><b style="font-weight:700;font-size:10px">5G</b><span style="display:inline-block;width:20px;height:11px;border:1px solid #fff;border-radius:2px;position:relative"><span style="position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:#fff;border-radius:1px"></span></span></span></div>
          <div style="height:56px;display:flex;align-items:center;justify-content:center;padding:0 16px"><span style="font-size:17px;font-weight:600">Complete Payment</span></div>
        </div>
        <div style="flex-shrink:0;padding:16px 16px 4px">
          <div style="height:6px;border-radius:4px;background:#E8E4F0;overflow:hidden"><div id="payBar" style="height:100%;width:84%;background:#673AB7;border-radius:4px;transition:width 1s linear"></div></div>
          <div id="payRemain" style="text-align:right;font-size:14px;font-weight:700;color:#673AB7;margin-top:10px">2:31 remaining</div>
        </div>
        <div style="flex:1;overflow:auto;padding:8px 16px 16px">
          <!-- summary -->
          <div style="border:1px solid #E0E0E0;border-radius:12px;padding:16px;margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;color:#757575">Darshan Date</span><span style="font-size:15px;color:#212121;font-weight:700;white-space:nowrap">11 July 2026</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;color:#757575">Darshan Slot</span><span style="font-size:15px;color:#212121;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:8px">8:00 AM <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#673AB7" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg></span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;color:#757575">No. of Pilgrims</span><span style="font-size:15px;color:#212121;font-weight:700;white-space:nowrap">1</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;color:#757575">Laddu Prasadam</span><span style="font-size:15px;color:#212121;font-weight:700;white-space:nowrap">2 (₹50)</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;color:#757575">Hundi Offering</span><span style="font-size:15px;color:#212121;font-weight:700;white-space:nowrap">₹100</span></div>
            <div style="height:1px;background:#E0E0E0;margin-bottom:12px"></div>
            <div style="display:flex;justify-content:space-between"><span style="font-size:15px;color:#212121;font-weight:700;white-space:nowrap">Total Cost</span><span style="font-size:16px;color:#212121;font-weight:800">₹950</span></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:0 4px">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2"><path d="M12 2l8 4v5c0 5-3.5 9-8 11-4.5-2-8-6-8-11V6z"/><path d="M9 12l2 2 4-4"/></svg>
            <span style="font-size:13px;color:#388E3C;font-weight:600;line-height:1.4">Your slot is locked. No one else can book it while you pay.</span>
          </div>

          <div style="font-size:16px;font-weight:700;color:#212121;margin-bottom:12px">Select Payment Method</div>
          <button data-pay="upi" onclick="pick('upi')" style="width:100%;height:56px;border:2px solid #673AB7;background:#F7F3FF;border-radius:8px;display:flex;align-items:center;gap:12px;padding:0 16px;margin-bottom:12px;cursor:pointer">
            <div style="width:40px;height:40px;border-radius:8px;background:#fff;border:1px solid #EEE;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:12px;color:#5F259F">UPI</div>
            <div style="flex:1;text-align:left"><div style="font-size:14.5px;font-weight:600;color:#212121">UPI</div><div style="font-size:12px;color:#9E9E9E">GPay, PhonePe, Paytm</div></div>
            <span data-radio="upi" style="width:20px;height:20px;border-radius:50%;border:6px solid #673AB7;flex-shrink:0"></span>
          </button>
          <button data-pay="card" onclick="pick('card')" style="width:100%;height:56px;border:1px solid #E0E0E0;background:#fff;border-radius:8px;display:flex;align-items:center;gap:12px;padding:0 16px;margin-bottom:12px;cursor:pointer">
            <div style="width:40px;height:40px;border-radius:8px;background:#fff;border:1px solid #EEE;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#673AB7" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2.5"/><path d="M2 9.5h20"/></svg></div>
            <div style="flex:1;text-align:left"><div style="font-size:14.5px;font-weight:600;color:#212121">Debit / Credit Card</div></div>
            <span data-radio="card" style="width:20px;height:20px;border-radius:50%;border:1.5px solid #C9C9CF;flex-shrink:0"></span>
          </button>
          <button data-pay="bank" onclick="pick('bank')" style="width:100%;height:56px;border:1px solid #E0E0E0;background:#fff;border-radius:8px;display:flex;align-items:center;gap:12px;padding:0 16px;margin-bottom:12px;cursor:pointer">
            <div style="width:40px;height:40px;border-radius:8px;background:#fff;border:1px solid #EEE;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#673AB7" stroke-width="1.8"><path d="M3 10l9-5 9 5M5 10v8M19 10v8M9 10v8M15 10v8M3 19h18"/></svg></div>
            <div style="flex:1;text-align:left"><div style="font-size:14.5px;font-weight:600;color:#212121">Net Banking</div><div style="font-size:12px;color:#9E9E9E;font-style:italic">May take longer</div></div>
            <span data-radio="bank" style="width:20px;height:20px;border-radius:50%;border:1.5px solid #C9C9CF;flex-shrink:0"></span>
          </button>
        </div>
        <div style="flex-shrink:0;padding:16px 16px;border-top:1px solid #EEE;background:#fff">
          <button style="width:100%;height:50px;border:none;border-radius:8px;background:#673AB7;color:#fff;font-size:16px;font-weight:700;cursor:pointer">Pay ₹950</button>
        </div>
      </div>
<script>
function pick(p){
  document.querySelectorAll('[data-pay]').forEach(b=>{const on=b.dataset.pay===p;
    b.setAttribute('style','width:100%;height:56px;border:'+(on?'2px solid #673AB7':'1px solid #E0E0E0')+';background:'+(on?'#F7F3FF':'#fff')+';border-radius:8px;display:flex;align-items:center;gap:12px;padding:0 16px;margin-bottom:12px;cursor:pointer');});
  document.querySelectorAll('[data-radio]').forEach(r=>{const on=r.dataset.radio===p;
    r.setAttribute('style',on?'width:20px;height:20px;border-radius:50%;border:6px solid #673AB7;flex-shrink:0':'width:20px;height:20px;border-radius:50%;border:1.5px solid #C9C9CF;flex-shrink:0');});
}
let s=151; const TOTAL=180;
const barEl=document.getElementById('payBar');
const remainEl=document.getElementById('payRemain');
setInterval(()=>{ if(s>0)s--; const m=Math.floor(s/60),ss=String(s%60).padStart(2,'0'); remainEl.textContent=m+':'+ss+' remaining'; barEl.style.width=(s/TOTAL*100)+'%'; },1000);
</script>
</body>
</html>
