<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>01 · Services Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

</style>

<body>
<div style="width:375px;height:780px;background:#fff;border-radius:18px;border:1px solid #DDE1E6;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(40,20,80,.08)">
        <div style="background:#4A148C;color:#fff;flex-shrink:0">

            </div>
          

          <div style="padding:12px 16px 24px">

              </div>

            <button style="width:100%;text-align:left;margin-bottom:12px;background:#fff;border:1px solid #E6E6EA;border-radius:14px;padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer">

            <button style="width:100%;text-align:left;margin-bottom:12px;background:#fff;border:1px solid #E6E6EA;border-radius:14px;padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer">
              <div style="width:46px;height:46px;border-radius:11px;background:#F4F0FB;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#673AB7" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg></div>
              <div style="flex:1"><div style="font-size:15.5px;font-weight:600;color:#212121">Hundi / Donations</div><div style="font-size:12px;color:#757575;margin-top:4px">Offer to Srivari Hundi</div></div>
              <span style="color:#C9C9CF;font-size:20px">›</span>

            <button style="width:100%;text-align:left;background:#fff;border:1px solid #E6E6EA;border-radius:14px;padding:16px;display:flex;align-items:center;gap:16px;cursor:pointer">

              <span style="color:#C9C9CF;font-size:20px">›</span>
