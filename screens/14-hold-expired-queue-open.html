<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>14 · Hold expired (queue open)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#ECEFF1;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  ::-webkit-scrollbar{width:0;height:0}
  @keyframes pulseOpacity{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes popIn{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div style="width:375px;height:780px;background:#fff;border-radius:18px;border:1px solid #DDE1E6;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(40,20,80,.08)">
        <div style="background:#4A148C;color:#fff;flex-shrink:0"><div style="height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px"><span style="font-weight:600">10:03</span><span style="display:flex;align-items:center;gap:8px"><b style="font-weight:700;font-size:10px">5G</b><span style="display:inline-block;width:20px;height:11px;border:1px solid #fff;border-radius:2px;position:relative"><span style="position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:#fff;border-radius:1px"></span></span></span></div><div style="height:56px;display:flex;align-items:center;justify-content:center"><span style="font-size:17px;font-weight:600">Slot Released</span></div></div>
        <div style="padding:16px 16px 8px;flex-shrink:0"><div style="height:8px;border-radius:4px;background:#E0E0E0;overflow:hidden"></div><div style="text-align:right;font-size:16px;font-weight:700;color:#F44336;margin-top:8px">0:00</div></div>
        <div style="flex:1;overflow:auto;padding:8px 16px 16px">
          <div style="background:#FFEBEE;border-radius:10px;padding:16px 16px;margin-bottom:20px"><div style="font-size:14px;font-weight:700;color:#D32F2F;margin-bottom:4px">Your 3-minute hold has expired</div><div style="font-size:12.5px;color:#C62828;line-height:1.5">The slot has been released for other pilgrims.</div></div>
          <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 8px 8px">
            <div style="width:54px;height:54px;border-radius:50%;border:4px solid #EDE7F6;border-top-color:#673AB7;margin-bottom:22px;animation:spin .8s linear infinite"></div>
            <div style="font-size:17px;font-weight:700;color:#212121;margin-bottom:8px">Taking you back to the queue…</div>
            <div style="font-size:13.5px;color:#757575;line-height:1.55">No need to start over — we're re-entering you automatically.</div>
          </div>
          <div style="background:#E8F5E9;border-radius:10px;padding:16px 16px;display:flex;gap:12px;align-items:flex-start;margin-top:12px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2" style="flex-shrink:0;margin-top:0px"><path d="M5 13l4 4L19 7"/></svg><div style="font-size:13px;color:#2E7D32;line-height:1.55"><b>Your pilgrim details are still saved</b> — you won't have to re-enter them.</div></div>
        </div>
      </div>

</body>
</html>
