<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Virtual Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#ECEFF1;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  ::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div style="width:375px;height:780px;background:#fff;border-radius:18px;border:1px solid #DDE1E6;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(40,20,80,.08)">
        <div style="background:#4A148C;color:#fff;flex-shrink:0">
          <div style="height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px"><span style="font-weight:600">10:00</span><span style="display:flex;align-items:center;gap:8px"><b style="font-weight:700;font-size:10px">5G</b><span style="display:inline-block;width:20px;height:11px;border:1px solid #fff;border-radius:2px;position:relative"><span style="position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:#fff;border-radius:1px"></span></span></span></div>
          <div style="height:56px;display:flex;align-items:center;gap:16px;padding:0 16px"><span style="font-size:17px;font-weight:600">Special Entry Darshan · Sri PAT</span></div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;background:#FAFAFB;overflow:hidden">
          <div style="background:#EDE7F6;display:flex;align-items:center;justify-content:center;padding:24px 0 20px">
            <div style="width:152px;height:200px;border-radius:12px;background:linear-gradient(160deg,#7E57C2,#4A148C);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(74,20,140,.3)">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity=".92"><path d="M12 2l2 3h-4l2-3z"/><path d="M5 9l7-4 7 4"/><path d="M5 9v11h14V9"/><path d="M9 20v-5a3 3 0 016 0v5"/></svg>
            </div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 36px 0;text-align:center">
            <div style="position:relative;width:172px;height:172px;margin-bottom:28px">
              <svg width="172" height="172" viewBox="0 0 172 172" style="transform:rotate(-90deg)">
                <circle cx="86" cy="86" r="76" fill="none" stroke="#EDE7F6" stroke-width="12"></circle>
                <circle id="ring" cx="86" cy="86" r="76" fill="none" stroke="#673AB7" stroke-width="12" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"></circle>
              </svg>
              <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
                <div id="clock" style="font-size:40px;font-weight:800;color:#212121;letter-spacing:-.02em;font-variant-numeric:tabular-nums">0:08</div>
                <div style="font-size:11px;font-weight:600;color:#9583B5;letter-spacing:.06em;text-transform:uppercase;margin-top:2px">estimated wait</div>
              </div>
            </div>
            <div style="font-size:19px;font-weight:700;color:#212121;margin-bottom:10px">You're in the queue</div>
            <div style="font-size:14px;color:#757575;line-height:1.55;max-width:280px">You've been placed in a virtual queue due to exceptionally high demand. Please keep this screen open.</div>
            <div style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E6E0F2;border-radius:22px;padding:12px 20px;margin-top:24px;box-shadow:0 2px 10px rgba(74,20,140,.06)">
              <span style="width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0"></span>
              <span style="font-size:14px;color:#212121">Your position <b id="pos" style="color:#4A148C;font-weight:700">1,248</b></span>
            </div>
          </div>
          <div style="flex-shrink:0;padding:16px;border-top:1px solid #EEE;background:#fff;display:flex;align-items:flex-start;gap:8px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#673AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/></svg>
            <div style="font-size:12px;color:#757575;line-height:1.5">Your spot is held automatically. Do not refresh or close — you won't lose your place.</div>
          </div>
        </div>
      </div>
<script>
(function(){
  var TOTAL=8, s=TOTAL;
  var C=2*Math.PI*76;
  var ring=document.getElementById('ring'), clock=document.getElementById('clock'), pos=document.getElementById('pos');
  ring.setAttribute('stroke-dasharray', C);
  function paint(){
    var frac=Math.max(0,s)/TOTAL;
    ring.setAttribute('stroke-dashoffset', C*(1-frac));
    clock.textContent='0:'+String(Math.max(0,s)).padStart(2,'0');
    pos.textContent=(Math.round(1248*frac)).toLocaleString();
  }
  paint();
  var t=setInterval(function(){
    s--; paint();
    if(s<=0){ clearInterval(t); pos.textContent='0'; setTimeout(function(){ window.__goto('slot-availability.html'); }, 500); }
  },1000);
})();
</script>
<script>
(function(){
  window.__goto=function(dest){
    if(window.parent&&window.parent!==window){ window.parent.postMessage({__ttdnav:dest},'*'); }
    else{ location.href=dest; }
  };
  document.addEventListener('click',function(e){
    var el=e.target&&e.target.closest?e.target.closest('[data-goto]'):null;
    if(el){ e.preventDefault(); window.__goto(el.getAttribute('data-goto')); }
  });
})();
</script>
</body>
</html>
