<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>04 · Add Pilgrim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#ECEFF1;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  ::-webkit-scrollbar{width:0;height:0}
  input{font-family:inherit}
  @keyframes pulseOpacity{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div style="width:375px;height:780px;background:#fff;border-radius:18px;border:1px solid #DDE1E6;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(40,20,80,.08)">
        <div style="background:#4A148C;color:#fff;flex-shrink:0">
          <div style="height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px"><span style="font-weight:600">10:00</span><span style="display:flex;align-items:center;gap:8px"><b style="font-weight:700;font-size:10px">5G</b><span style="display:inline-block;width:20px;height:11px;border:1px solid #fff;border-radius:2px;position:relative"><span style="position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:#fff;border-radius:1px"></span></span></span></div>
          <div style="height:56px;display:flex;align-items:center;gap:16px;padding:0 16px"><span style="font-size:22px;line-height:1">←</span><span style="font-size:17px;font-weight:600">Add Pilgrim</span></div>
        </div>
        <div style="flex:1;overflow:auto;padding:20px 16px">
          <div style="margin-bottom:24px">
            <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Name <span style="color:#F44336">*</span></label>
            <input value="Ramesh Kumar" style="width:100%;height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#212121;background:#fff" />
            <div style="font-size:11.5px;color:#9E9E9E;margin-top:8px">Full name exactly as on ID proof</div>
          </div>
          <div style="margin-bottom:24px">
            <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Age <span style="color:#F44336">*</span></label>
            <input value="58" style="width:100%;height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#212121;background:#fff" />
          </div>
          <div style="margin-bottom:24px">
            <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Gender <span style="color:#F44336">*</span></label>
            <div style="height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#212121;background:#fff;display:flex;align-items:center;justify-content:space-between">Male <span style="color:#757575;font-size:13px">▼</span></div>
          </div>
          <div style="margin-bottom:24px">
            <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Photo ID Proof <span style="color:#F44336">*</span></label>
            <button onclick="toggleId()" style="width:100%;height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#212121;background:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer;text-align:left"id="idProofVal">Aadhaar Card <span style="color:#757575;font-size:13px">▼</span></button>
            <div style="font-size:11.5px;color:#9E9E9E;margin-top:8px">Tap to toggle Aadhaar ⇄ Passport (demo)</div>
          </div>
          <div style="margin-bottom:24px">
            <label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Photo ID Number <span style="color:#F44336">*</span></label>
            <input id="idNum" value="4523 8891 0012" style="width:100%;height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#212121;background:#fff" />
          </div>

          <div id="foreign" style="display:none">
            <div style="border-top:1px dashed #DDD;padding-top:20px;margin-top:4px">
              <div style="font-size:12px;font-weight:700;color:#673AB7;margin-bottom:16px;letter-spacing:.02em">FOREIGN PILGRIM DETAILS</div>
              <div style="margin-bottom:24px"><label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Country <span style="color:#F44336">*</span></label><div style="height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#212121;background:#fff;display:flex;align-items:center;justify-content:space-between">United States <span style="color:#757575;font-size:13px">▼</span></div></div>
              <div style="margin-bottom:24px"><label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Visa / OCI Number <span style="color:#F44336">*</span></label><input value="OCI-A2291847" style="width:100%;height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#212121;background:#fff" /></div>
              <div style="margin-bottom:24px"><label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Visa Type <span style="color:#F44336">*</span></label><div style="height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#212121;background:#fff;display:flex;align-items:center;justify-content:space-between">OCI Card <span style="color:#757575;font-size:13px">▼</span></div></div>
              <div style="margin-bottom:24px"><label style="font-size:13px;color:#757575;margin-bottom:8px;display:block">Visa Validity Date <span style="color:#F44336">*</span></label><div style="height:48px;border:1px solid #CFCFD6;border-radius:8px;padding:0 16px;font-size:16px;color:#9E9E9E;background:#fff;display:flex;align-items:center;justify-content:space-between">DD / MM / YYYY <span style="color:#757575;font-size:15px">🗓</span></div></div>
            </div>
          </div>

          <div style="background:#F5F5F5;border-radius:10px;padding:12px 16px;display:flex;gap:12px;align-items:flex-start;margin-top:4px">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="1.8" style="flex-shrink:0;margin-top:0px"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg>
            <div style="font-size:12.5px;color:#757575;line-height:1.55">Your ID details are saved only on this device and TTD servers. Original ID must be produced at the temple gate for verification.</div>
          </div>
        </div>
        <div style="flex-shrink:0;display:flex;gap:12px;padding:16px 16px;border-top:1px solid #EEE;background:#fff">
          <button style="flex:1;height:48px;border:1px solid #673AB7;border-radius:8px;background:#fff;color:#673AB7;font-size:16px;font-weight:700;cursor:pointer">Cancel</button>
          <button style="flex:1;height:48px;border:none;border-radius:8px;background:#673AB7;color:#fff;font-size:16px;font-weight:700;cursor:pointer">Save Pilgrim</button>
        </div>
      </div>
<script>
let passport=false;
function toggleId(){
  passport=!passport;
  document.getElementById('idProofVal').firstChild.textContent = passport ? 'Passport ' : 'Aadhaar Card ';
  document.getElementById('idNum').value = passport ? 'N1234567' : '4523 8891 0012';
  document.getElementById('foreign').style.display = passport ? 'block' : 'none';
}
</script>
</body>
</html>
